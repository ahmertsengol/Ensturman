<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <title>Dashboard - Voice Recorder App</title>
</head>
<body>
  <header>
    <div class="container">
      <h1>Voice Recorder App</h1>
      <div class="header-buttons">
        <a href="/recordings/add" class="btn">New Recording</a>
        <a href="/auth/logout" class="btn btn-outline">Logout</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <h2>Welcome <span id="username"></span></h2>
      
      <div class="dashboard-content">
        <div class="recordings-list">
          <h3>Your Recordings</h3>
          <div id="recordings-container">
            <!-- Recordings will be loaded here -->
            <div class="no-recordings" id="no-recordings">
              <p>You don't have any recordings yet.</p>
              <a href="/recordings/add" class="btn">Create Your First Recording</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 Voice Recorder App</p>
    </div>
  </footer>

  <script>
    // Fetch user data and recordings
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Display username
        const userResponse = await fetch('/api/user');
        const userData = await userResponse.json();
        document.getElementById('username').textContent = userData.username;
        
        // Fetch recordings
        const recordingsResponse = await fetch('/api/recordings');
        const recordings = await recordingsResponse.json();
        
        const recordingsContainer = document.getElementById('recordings-container');
        const noRecordings = document.getElementById('no-recordings');
        
        if (recordings.length > 0) {
          noRecordings.style.display = 'none';
          
          recordings.forEach(recording => {
            const recordingElement = document.createElement('div');
            recordingElement.className = 'recording-item';
            recordingElement.innerHTML = `
              <div class="recording-info">
                <h4>${recording.title}</h4>
                <p>${recording.description || 'No description'}</p>
                <p class="recording-date">Recorded on: ${new Date(recording.createdAt).toLocaleDateString()}</p>
              </div>
              <div class="recording-controls">
                <audio controls src="/uploads/${recording.audioFile}"></audio>
                <div class="recording-actions">
                  <a href="/recordings/edit/${recording.id}" class="btn btn-sm">Edit</a>
                  <form action="/recordings/${recording.id}" method="POST" class="delete-form">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                  </form>
                </div>
              </div>
            `;
            
            recordingsContainer.appendChild(recordingElement);
          });
        }
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    });
  </script>
</body>
</html>
