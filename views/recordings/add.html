<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <title>Record Audio - Voice Recorder App</title>
</head>
<body>
  <header>
    <div class="container">
      <h1>Voice Recorder App</h1>
      <div class="header-buttons">
        <a href="/dashboard" class="btn">Dashboard</a>
        <a href="/auth/logout" class="btn btn-outline">Logout</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <h2>Record Audio</h2>
      
      <!-- Flash Messages -->
      <div id="messages">
        <div class="alert alert-error" id="error-message" style="display: none;"></div>
        <div class="alert alert-success" id="success-message" style="display: none;"></div>
      </div>
      
      <div class="recording-container">
        <div class="recorder-controls">
          <div class="recorder-status">
            <div id="record-status">Ready to record</div>
            <div id="timer">00:00</div>
          </div>
          
          <div class="recorder-buttons">
            <button id="record-button" class="btn btn-lg">Start Recording</button>
            <button id="stop-button" class="btn btn-lg" disabled>Stop Recording</button>
            <button id="play-button" class="btn btn-lg" disabled>Play Recording</button>
          </div>
          
          <div class="audio-visualizer">
            <canvas id="visualizer" width="500" height="100"></canvas>
          </div>
          
          <div id="audio-player-container" style="display: none;">
            <audio id="audio-player" controls></audio>
          </div>
        </div>
        
        <div class="recording-form">
          <form id="recording-form" action="/recordings" method="POST" enctype="multipart/form-data">
            <div class="form-group">
              <label for="title">Title</label>
              <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
              <label for="description">Description (optional)</label>
              <textarea id="description" name="description" rows="3"></textarea>
            </div>
            <input type="hidden" id="duration" name="duration" value="0">
            <input type="file" id="audio-file" name="audio" style="display: none;" accept="audio/*">
            <div class="form-buttons">
              <button type="submit" id="save-button" class="btn btn-lg" disabled>Save Recording</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 Voice Recorder App</p>
    </div>
  </footer>

  <script src="/js/recorder.js"></script>
  <script>
    // Display flash messages
    document.addEventListener('DOMContentLoaded', () => {
      // Check for messages in cookies (set by the server)
      const getCookie = (name) => {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
      };
      
      const errorMsg = getCookie('error_msg');
      const successMsg = getCookie('success_msg');
      
      const errorEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');
      
      if (errorMsg) {
        errorEl.textContent = errorMsg;
        errorEl.style.display = 'block';
        
        // Clear cookie
        document.cookie = 'error_msg=; Max-Age=0; path=/;';
        
        // Auto-hide after 5 seconds
        setTimeout(() => {
          errorEl.style.display = 'none';
        }, 5000);
      }
      
      if (successMsg) {
        successEl.textContent = successMsg;
        successEl.style.display = 'block';
        
        // Clear cookie
        document.cookie = 'success_msg=; Max-Age=0; path=/;';
        
        // Auto-hide after 5 seconds
        setTimeout(() => {
          successEl.style.display = 'none';
        }, 5000);
      }
    });
  </script>
</body>
</html>
